# @claude メンションが含まれる Issue や PR のコメントに対して Claude が自動で応答する
# 参考: https://github.com/anthropics/claude-code-action/blob/main/examples/claude.yml

name: Claude PR Assistant

# トリガー条件: 以下のイベントで実行される
on:
  issue_comment:           # Issue コメントが作成された時
    types: [created]
  pull_request_review_comment:  # PR レビューコメントが作成された時
    types: [created]
  issues:                  # Issue が開かれた時や担当者が設定された時
    types: [opened, assigned]
  pull_request_review:     # PR レビューが提出された時
    types: [submitted]

jobs:
  claude-code-action:
    # @claude メンションが含まれている場合のみ実行
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && contains(github.event.issue.body, '@claude'))

    runs-on: ubuntu-latest

    # 必要な権限設定
    permissions:
      contents: read         # リポジトリ内容の読み取り
      pull-requests: read    # PR の読み取り
      issues: read          # Issue の読み取り
      id-token: write       # OIDC トークンの書き込み（認証用）

    steps:
      # リポジトリのチェックアウト
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1    # 最新コミットのみ取得（高速化）

      # Claude Code Action の実行
      - name: Run Claude PR Action
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}  # Anthropic API キー（シークレット）
          timeout_minutes: "60"                               # タイムアウト時間（60分）
